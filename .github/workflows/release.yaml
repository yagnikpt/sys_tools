name: Release

on:
  push:
    tags:
      - "*/v*" # matches bmark/v1.0.0, article_spawner/v0.2.0

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract tool name from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          TOOL=$(echo "$TAG" | cut -d'/' -f1)
          VERSION=$(echo "$TAG" | cut -d'/' -f2)
          echo "tool=$TOOL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ steps.meta.outputs.tool }}/go.mod
          cache-dependency-path: ${{ steps.meta.outputs.tool }}/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          workdir: ${{ steps.meta.outputs.tool }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.meta.outputs.version }}
